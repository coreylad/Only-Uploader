<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Only-Uploader{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="{{ url_for('index') }}">Only-Uploader</a>
    <ul class="nav-links">
      <li><a href="{{ url_for('index') }}">Dashboard</a></li>
      <li><a href="{{ url_for('upload_get') }}">Upload</a></li>
      <li><a href="{{ url_for('cross_seed_get') }}">Cross-Seed</a></li>
      <li><a href="{{ url_for('config_get') }}">Config</a></li>
    </ul>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
